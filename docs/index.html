<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>skiliaris contributions</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .light { display: none; }
    @media (prefers-color-scheme: light) {
      body { background: #ffffff; color: #24292f; }
      .light { display: block; }
      .dark { display: none; }
    }
    @media (prefers-color-scheme: dark) {
      .light { display: none; }
      .dark { display: block; }
    }
  </style>
</head>
<body>
  <img class="light" src="./assets/contributions-light.svg" alt="skiliaris contribution chart light">
  <img class="dark" src="./assets/contributions-dark.svg" alt="skiliaris contribution chart dark">
</body>
</html>
